<!DOCTYPE html>
<html>
<head>
    <title>Receiver Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        .card { border: 1px solid #ccc; padding: 10px; margin: 10px; display: inline-block; width: 200px; border-radius: 8px; }
        .active { border-left: 5px solid green; }
        .inactive { border-left: 5px solid red; opacity: 0.6; }
    </style>
</head>
<body>
    <h1>Live Team Tracker</h1>
    <div id="container"></div>

    <script>
        const firebaseConfig = { /* SAME AS ABOVE */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('locations').on('value', (snapshot) => {
            const data = snapshot.val();
            const container = document.getElementById('container');
            container.innerHTML = ''; // Refresh list

            for (let id in data) {
                const user = data[id];
                const div = document.createElement('div');
                div.className = `card ${user.active ? 'active' : 'inactive'}`;
                div.innerHTML = `
                    <strong>${id}</strong><br>
                    Lat: ${user.lat}<br>
                    Lng: ${user.lng}<br>
                    Status: ${user.active ? "LIVE" : "OFFLINE"}
                `;
                container.appendChild(div);
            }
        });
    </script>
</body>
</html>
