<!DOCTYPE html>
<html>
<head>
    <title>SUPERVISOR - Active Only</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { height: 100vh; width: 100%; background: #eee; z-index: 1; }
        
        /* Fixed UI Box for User List */
        #legend { 
            position: absolute; top: 20px; right: 20px; 
            background: rgba(255, 255, 255, 0.95); 
            padding: 15px; border-radius: 10px; 
            z-index: 1000; width: 200px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: 1px solid #ccc;
        }
        .user-entry { 
            margin-bottom: 8px; font-size: 0.9rem; 
            display: flex; align-items: center; 
        }
        .dot { height: 10px; width: 10px; border-radius: 50%; margin-right: 10px; }
    </style>
</head>
<body>

<div id="legend">
    <strong style="display:block; margin-bottom:10px; border-bottom:1px solid #eee; padding-bottom:5px;">Active Riders</strong>
    <div id="userList">Waiting for data...</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
         apiKey: "AIzaSyBEhnGY-1nQ9lM6dcCTdhvZBE5KcrC75iQ",
  authDomain: "staff-tracker-20023.firebaseapp.com",
  databaseURL: "https://staff-tracker-20023-default-rtdb.firebaseio.com",
  projectId: "staff-tracker-20023",
  storageBucket: "staff-tracker-20023.firebasestorage.app",
  messagingSenderId: "661387365775",
  appId: "1:661387365775:web:6a0a36c68a18791e9dcffa",
  measurementId: "G-LC55HS8XEP"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Standard Map Initialization
    const map = L.map('map').setView([0, 0], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const users = {}; // Stores { marker, lastUpdate }

    function getHue(id) {
        let hash = 0;
        for (let i = 0; i < id.length; i++) hash = id.charCodeAt(i) + ((hash << 5) - hash);
        return hash % 360;
    }

    db.ref('live_location').on('value', (snapshot) => {
        const data = snapshot.val();
        if (!data) return;

        const listHtml = [];
        const now = Date.now();

        for (let id in data) {
            const { lat, lng, status, time } = data[id];
            
            // --- LOGIC: Only show pins active in the last 60 seconds ---
            const isActive = (now - time) < 60000 && status === 'online';
            const hue = getHue(id);

            if (isActive) {
                // If marker doesn't exist, create it
                if (!users[id]) {
                    users[id] = L.marker([lat, lng]).addTo(map).bindPopup(`<b>${id}</b>`);
                    users[id]._icon.style.filter = `hue-rotate(${hue}deg)`;
                } else {
                    // Update existing marker position
                    users[id].setLatLng([lat, lng]);
                }
                
                listHtml.push(`
                    <div class="user-entry">
                        <span class="dot" style="background: hsl(${hue}, 70%, 50%)"></span>
                        <span>${id}</span>
                    </div>
                `);
            } else {
                // If user is offline/inactive, remove their pin from the map
                if (users[id]) {
                    map.removeLayer(users[id]);
                    delete users[id];
                }
            }
        }
        
        const userListDiv = document.getElementById('userList');
        userListDiv.innerHTML = listHtml.length > 0 ? listHtml.join('') : "No active riders";
    });
</script>
</body>
</html>
