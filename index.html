<!DOCTYPE html>
<html>
<head>
    <title>SENDER - Multi-Tracker Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; }
        #map { height: 50vh; width: 100%; }
        .controls { padding: 25px; }
        #mainBtn { 
            width: 100%; padding: 20px; font-size: 1.3rem; border: none; border-radius: 50px; 
            background: #007bff; color: white; font-weight: bold; cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .active-btn { background: #dc3545 !important; }
        #status { margin-top: 15px; font-size: 0.9rem; color: #aaa; }
    </style>
</head>
<body>

<div id="map"></div>
<div class="controls">
    <button id="mainBtn" onclick="toggleTracking()">START TRACKING</button>
    <div id="status">Ready. ID: <span id="displayId">...</span></div>
</div>

<audio id="silentAudio" loop><source src="https://raw.githubusercontent.com/anars/blank-audio/master/10-seconds-of-silence.mp3" type="audio/mp3"></audio>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyBEhnGY-1nQ9lM6dcCTdhvZBE5KcrC75iQ",
  authDomain: "staff-tracker-20023.firebaseapp.com",
  databaseURL: "https://staff-tracker-20023-default-rtdb.firebaseio.com",
  projectId: "staff-tracker-20023",
  storageBucket: "staff-tracker-20023.firebasestorage.app",
  messagingSenderId: "661387365775",
  appId: "1:661387365775:web:6a0a36c68a18791e9dcffa",
  measurementId: "G-LC55HS8XEP"
    };

    // 1. Setup Identity
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('id') || "User_" + Math.floor(Math.random() * 1000);
    document.getElementById('displayId').innerText = userId;

    // 2. Initialize
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let map = L.map('map').setView([0, 0], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    let marker, watchId = null, wakeLock = null;

    async function toggleTracking() {
        const btn = document.getElementById('mainBtn');
        const audio = document.getElementById('silentAudio');

        if (watchId === null) {
            // START
            btn.innerText = "STOP TRACKING";
            btn.classList.add('active-btn');
            audio.play(); // Start silent loop to keep process alive

            if ('wakeLock' in navigator) {
                try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
            }

            watchId = navigator.geolocation.watchPosition(success, error, {
                enableHighAccuracy: true, timeout: 15000, maximumAge: 0
            });
        } else {
            // STOP
            btn.innerText = "START TRACKING";
            btn.classList.remove('active-btn');
            audio.pause();
            navigator.geolocation.clearWatch(watchId);
            watchId = null;
            if (wakeLock) { wakeLock.release(); wakeLock = null; }
            db.ref('live_location/' + userId).update({ status: 'offline' });
        }
    }

    function success(pos) {
        const { latitude, longitude, accuracy } = pos.coords;
        document.getElementById('status').innerText = `Live (Acc: ${Math.round(accuracy)}m)`;

        if (!marker) {
            marker = L.marker([latitude, longitude]).addTo(map);
            map.setView([latitude, longitude], 16);
        } else {
            marker.setLatLng([latitude, longitude]);
        }

        db.ref('live_location/' + userId).set({
            lat: latitude, lng: longitude, time: Date.now(), status: 'online'
        });
    }

    function error(err) {
        document.getElementById('status').innerText = "GPS Error: " + err.message;
    }
</script>
</body>
</html>
